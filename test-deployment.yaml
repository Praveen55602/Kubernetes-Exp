apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-pod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-pod
  template:
    metadata:
      labels:
        app: test-pod
    spec:
      containers:
        - name: go-pod
          image: golang:alpine
          command: ["sleep", "3600"]
