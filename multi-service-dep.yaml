# -----------------------------------
# 1. PUBLIC: Gateway Service (Search)
# -----------------------------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: gateway-app }
spec:
  replicas: 2
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
      - name: web
        image: hashicorp/http-echo
        args: ["-text=Public Gateway: Search for files here", "-listen=:8080"]
---
apiVersion: v1
kind: Service
metadata: { name: gateway-service }
spec:
  type: NodePort
  selector: { app: gateway }
  ports: [{ port: 80, targetPort: 8080, nodePort: 30001 }]

# -----------------------------------
# 2. PUBLIC: Tracker Service (Peers)
# -----------------------------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: tracker-app }
spec:
  replicas: 2
  selector: { matchLabels: { app: tracker } }
  template:
    metadata: { labels: { app: tracker } }
    spec:
      containers:
      - name: web
        image: hashicorp/http-echo
        args: ["-text=Public Tracker: Announce your chunks here", "-listen=:8080"]
---
apiVersion: v1
kind: Service
metadata: { name: tracker-service }
spec:
  type: NodePort
  selector: { app: tracker }
  ports: [{ port: 80, targetPort: 8080, nodePort: 30002 }]

# -----------------------------------
# 3. INTERNAL: Chunk Manager
# -----------------------------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: chunk-manager-app }
spec:
  replicas: 2
  selector: { matchLabels: { app: chunk-manager } }
  template:
    metadata: { labels: { app: chunk-manager } }
    spec:
      containers:
      - name: web
        image: hashicorp/http-echo
        args: ["-text=Internal Chunk Manager: Processing file data", "-listen=:8080"]
---
apiVersion: v1
kind: Service
metadata: { name: chunk-manager-service }
spec:
  type: ClusterIP
  selector: { app: chunk-manager }
  ports: [{ port: 80, targetPort: 8080 }]

# -----------------------------------
